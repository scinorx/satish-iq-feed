    <g>
      <rect x="1980" y="765" width="570" height="380" rx="72" fill="#081E34" stroke="#38F2FF" stroke-width="12"/>
      <path d="M2060 950 H2470 M2265 795 V1120 M2060 840 H2470 M2060 1060 H2470" fill="none" stroke="#B6FF4D" stroke-width="8" opacity="0.60"/>
      <circle cx="2265" cy="950" r="120" fill="none" stroke="#F6FCFF" stroke-width="10" opacity="0.70"/>
      <circle cx="2265" cy="950" r="34" fill="#FFD166" opacity="0.90"/>
      <rect x="2105" y="1305" width="495" height="300" rx="56" fill="#081E34" stroke="#BDEEFF" stroke-width="10"/>
      <text x="2198" y="1488" class="title" style="font-size:138px;fill:#B6FF4D;letter-spacing:4px;">VAR</text>
      <path d="M1925 1790 H2695 M1925 1925 H2695 M2085 1700 V2035 M2540 1700 V2035" fill="none" stroke="#38F2FF" stroke-width="10" opacity="0.36"/>
      <path d="M2550 1135 C2660 1225 2660 1320 2600 1390" fill="none" stroke="#FFD166" stroke-width="12" stroke-linecap="round"/>
    </g>
