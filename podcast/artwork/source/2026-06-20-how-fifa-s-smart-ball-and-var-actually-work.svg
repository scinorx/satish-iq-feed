  <g>
    <rect x="245" y="1960" width="1069" height="104" rx="52" fill="#102A44" stroke="#38F2FF" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">BALL SENSORS + VAR + TRUST</text>
    <path d="M260 2145 H1075" stroke="url(#rule)" stroke-width="22" stroke-linecap="round"/>
