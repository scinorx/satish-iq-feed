<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03261E"/>
      <stop offset="48%" stop-color="#075B47"/>
      <stop offset="100%" stop-color="#003A4D"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="26%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#38F2FF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#B6FF4D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#03261E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#B6FF4D" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#B6FF4D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38F2FF"/>
