<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#041B22"/>
      <stop offset="48%" stop-color="#07515D"/>
      <stop offset="100%" stop-color="#062B38"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="26%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#6AE8FF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#B6FF4D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#041B22" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#B6FF4D" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#B6FF4D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6AE8FF"/>
      <stop offset="55%" stop-color="#B6FF4D"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#BFEFFF" opacity="0.12"/>
    </pattern>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 8px; fill: #E8FBFF; }
      .eyebrow { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 52px; font-weight: 900; letter-spacing: 7px; fill: #B6FF4D; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 218px; font-weight: 950; letter-spacing: -1px; fill: #F6FCFF; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; fill: #BDEEFF; }
      .label { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 4px; fill: #E8FBFF; }
      .micro { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 3px; fill: #B8D9E8; }
    </style>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#dotGrid)" opacity="0.48"/>
  <circle cx="820" cy="980" r="1050" fill="url(#leftGlow)"/>
  <circle cx="2350" cy="1060" r="860" fill="url(#rightGlow)"/>
  <path d="M180 460 C650 350 980 520 1320 700 C1705 904 2030 760 2570 515" fill="none" stroke="#6AE8FF" stroke-width="7" opacity="0.22"/>
  <path d="M260 2430 C780 2180 1240 2310 1700 2440 C2080 2548 2360 2505 2750 2310" fill="none" stroke="#B6FF4D" stroke-width="7" opacity="0.18"/>

  <rect x="120" y="120" width="2760" height="2760" rx="110" fill="none" stroke="#AEEFFF" stroke-width="10" opacity="0.34"/>
  <rect x="165" y="165" width="2670" height="2670" rx="86" fill="none" stroke="#6AE8FF" stroke-width="3" opacity="0.24"/>

  <text x="245" y="345" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <text x="245" y="540" class="eyebrow">DAILY TECH BRIEF</text>

  <g filter="url(#deepShadow)">
    <text x="245" y="905" class="title">WHY BROWSERS</text>
    <text x="245" y="1162" class="title">ARE BECOMING</text>
    <text x="245" y="1419" class="title">REAL COMPUTE</text>
    <text x="245" y="1676" class="title">RUNTIMES</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.96">
    <g>
      <rect x="1840" y="880" width="880" height="620" rx="82" fill="#081E34" stroke="#6AE8FF" stroke-width="16"/>
      <path d="M1840 1065 H2720" fill="none" stroke="#BDEEFF" stroke-width="14" opacity="0.70"/>
      <circle cx="1945" cy="975" r="30" fill="#FFD166"/>
      <circle cx="2040" cy="975" r="30" fill="#B6FF4D" opacity="0.75"/>
      <circle cx="2135" cy="975" r="30" fill="#6AE8FF" opacity="0.75"/>
      <path d="M2040 1255 L2185 1375 L2040 1495 M2520 1255 L2375 1375 L2520 1495" fill="none" stroke="#B6FF4D" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2325 1220 L2225 1530" fill="none" stroke="#F6FCFF" stroke-width="18" stroke-linecap="round"/>
      <rect x="1985" y="1765" width="610" height="360" rx="64" fill="#102A44" stroke="#B6FF4D" stroke-width="12"/>
      <path d="M2100 1878 H2480 M2100 1998 H2370" fill="none" stroke="#FFD166" stroke-width="16" stroke-linecap="round"/>
    </g>
  </g>

  <g>
    <rect x="245" y="1960" width="1239" height="104" rx="52" fill="#102A44" stroke="#6AE8FF" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">WEB APIS + WASM + LOCAL COMPUTE</text>
    <path d="M260 2145 H1075" stroke="url(#rule)" stroke-width="22" stroke-linecap="round"/>
    <text x="260" y="2290" class="small">2026-06-15</text>
    <text x="260" y="2580" class="small">RUNTIMES</text>
  </g>
</svg>
