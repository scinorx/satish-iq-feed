<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#081A26"/>
      <stop offset="48%" stop-color="#0E5364"/>
      <stop offset="100%" stop-color="#151E3B"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="26%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#38F2FF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#B6FF4D" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#081A26" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#B6FF4D" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#B6FF4D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38F2FF"/>
      <stop offset="55%" stop-color="#B6FF4D"/>
      <stop offset="100%" stop-color="#FFB347"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#BFEFFF" opacity="0.12"/>
    </pattern>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 8px; fill: #E8FBFF; }
      .eyebrow { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 52px; font-weight: 900; letter-spacing: 7px; fill: #B6FF4D; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 252px; font-weight: 950; letter-spacing: -1px; fill: #F6FCFF; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; fill: #BDEEFF; }
      .label { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 4px; fill: #E8FBFF; }
      .micro { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 3px; fill: #B8D9E8; }
    </style>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#dotGrid)" opacity="0.48"/>
  <circle cx="820" cy="980" r="1050" fill="url(#leftGlow)"/>
  <circle cx="2350" cy="1060" r="860" fill="url(#rightGlow)"/>
  <path d="M180 460 C650 350 980 520 1320 700 C1705 904 2030 760 2570 515" fill="none" stroke="#38F2FF" stroke-width="7" opacity="0.22"/>
  <path d="M260 2430 C780 2180 1240 2310 1700 2440 C2080 2548 2360 2505 2750 2310" fill="none" stroke="#B6FF4D" stroke-width="7" opacity="0.18"/>

  <rect x="120" y="120" width="2760" height="2760" rx="110" fill="none" stroke="#AEEFFF" stroke-width="10" opacity="0.34"/>
  <rect x="165" y="165" width="2670" height="2670" rx="86" fill="none" stroke="#38F2FF" stroke-width="3" opacity="0.24"/>

  <text x="245" y="345" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <text x="245" y="540" class="eyebrow">DAILY TECH BRIEF</text>

  <g filter="url(#deepShadow)">
    <text x="245" y="990" class="title">VECTOR</text>
    <text x="245" y="1287" class="title">DATABASE</text>
    <text x="245" y="1584" class="title">INDEX DESIGN</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.96">
    <g>
      <path d="M1860 960 C2080 815 2380 820 2620 1030 C2765 1160 2765 1430 2580 1585 C2320 1805 2000 1700 1840 1490 C1725 1340 1725 1070 1860 960 Z" fill="#081E34" stroke="#38F2FF" stroke-width="12" opacity="0.92"/>
      <circle cx="1960" cy="1130" r="56" fill="#B6FF4D"/>
      <circle cx="2240" cy="1010" r="56" fill="#FFB347"/>
      <circle cx="2525" cy="1230" r="56" fill="#38F2FF"/>
      <circle cx="2160" cy="1495" r="56" fill="#B6FF4D" opacity="0.78"/>
      <path d="M2015 1110 L2188 1032 L2478 1202 M2215 1058 L2175 1442 M2220 1482 L2480 1265" fill="none" stroke="#F6FCFF" stroke-width="12" opacity="0.66"/>
      <rect x="1900" y="1880" width="725" height="230" rx="58" fill="#102A44" stroke="#B6FF4D" stroke-width="12"/>
      <path d="M2010 1995 H2510 M2510 1995 L2440 1930 M2510 1995 L2440 2060" fill="none" stroke="#FFB347" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g>
    <rect x="245" y="1960" width="1239" height="104" rx="52" fill="#102A44" stroke="#38F2FF" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">EMBEDDINGS + SEARCH + TRADEOFFS</text>
    <path d="M260 2145 H1075" stroke="url(#rule)" stroke-width="22" stroke-linecap="round"/>
    <text x="260" y="2290" class="small">2026-06-13</text>
    <text x="260" y="2580" class="small">DATABASES</text>
  </g>
</svg>
