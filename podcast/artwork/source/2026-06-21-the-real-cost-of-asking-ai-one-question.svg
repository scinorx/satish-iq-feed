<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111F"/>
      <stop offset="42%" stop-color="#0A2341"/>
      <stop offset="100%" stop-color="#001A2E"/>
    </linearGradient>
    <radialGradient id="askGlow" cx="28%" cy="39%" r="55%">
      <stop offset="0%" stop-color="#26F4FF" stop-opacity="0.42"/>
      <stop offset="58%" stop-color="#1677FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#07111F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meterGlow" cx="78%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#B6FF4D" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#B6FF4D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="meter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26F4FF"/>
      <stop offset="62%" stop-color="#B6FF4D"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#AEEFFF" opacity="0.14"/>
    </pattern>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 8px; fill: #DDF9FF; }
      .eyebrow { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 52px; font-weight: 900; letter-spacing: 7px; fill: #B6FF4D; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 265px; font-weight: 950; letter-spacing: -2px; fill: #F5FCFF; }
      .titleAccent { fill: #26F4FF; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; fill: #AEEFFF; }
      .label { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 4px; fill: #DDF9FF; }
      .micro { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 3px; fill: #B8D9E8; }
    </style>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#dotGrid)" opacity="0.52"/>
  <circle cx="850" cy="980" r="1050" fill="url(#askGlow)"/>
  <circle cx="2360" cy="1060" r="850" fill="url(#meterGlow)"/>
  <path d="M180 460 C650 350 980 520 1320 700 C1705 904 2030 760 2570 515" fill="none" stroke="#26F4FF" stroke-width="7" opacity="0.22"/>
  <path d="M260 2430 C780 2180 1240 2310 1700 2440 C2080 2548 2360 2505 2750 2310" fill="none" stroke="#B6FF4D" stroke-width="7" opacity="0.16"/>

  <rect x="120" y="120" width="2760" height="2760" rx="110" fill="none" stroke="#AEEFFF" stroke-width="10" opacity="0.34"/>
  <rect x="165" y="165" width="2670" height="2670" rx="86" fill="none" stroke="#26F4FF" stroke-width="3" opacity="0.22"/>

  <text x="245" y="345" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <text x="245" y="540" class="eyebrow">DAILY TECH BRIEF</text>

  <g filter="url(#deepShadow)">
    <text x="245" y="1035" class="title">THE REAL COST</text>
    <text x="245" y="1342" class="title">OF ONE <tspan class="titleAccent">AI</tspan></text>
    <text x="245" y="1649" class="title">QUESTION</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.95">
    <circle cx="2295" cy="870" r="270" fill="#081E34" stroke="#26F4FF" stroke-width="16"/>
    <text x="2215" y="970" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="285" font-weight="950" fill="#26F4FF">?</text>
  </g>

  <g opacity="0.92">
    <rect x="2035" y="1280" width="555" height="610" rx="72" fill="#071827" stroke="#AEEFFF" stroke-width="8" opacity="0.92"/>
    <rect x="2105" y="1360" width="415" height="76" rx="38" fill="#15304A" stroke="#26F4FF" stroke-width="5"/>
    <text x="2148" y="1414" class="micro">TOKENS IN</text>
    <rect x="2105" y="1488" width="415" height="76" rx="38" fill="#15304A" stroke="#B6FF4D" stroke-width="5"/>
    <text x="2148" y="1542" class="micro">MODEL TIME</text>
    <rect x="2105" y="1616" width="415" height="76" rx="38" fill="#15304A" stroke="#FFD166" stroke-width="5"/>
    <text x="2148" y="1670" class="micro">GPU POWER</text>
    <path d="M2130 1808 H2495" stroke="url(#meter)" stroke-width="36" stroke-linecap="round"/>
    <circle cx="2465" cy="1808" r="52" fill="#FFD166" stroke="#FFF3B0" stroke-width="8"/>
  </g>

  <g opacity="0.78">
    <rect x="1750" y="635" width="145" height="92" rx="22" fill="#102A44" stroke="#26F4FF" stroke-width="5"/>
    <text x="1794" y="697" class="micro">$</text>
    <rect x="1925" y="515" width="145" height="92" rx="22" fill="#102A44" stroke="#B6FF4D" stroke-width="5"/>
    <text x="1960" y="577" class="micro">ms</text>
    <rect x="2580" y="1135" width="145" height="92" rx="22" fill="#102A44" stroke="#FFD166" stroke-width="5"/>
    <text x="2612" y="1197" class="micro">kWh</text>
    <path d="M1895 680 C2025 700 2070 790 2140 830" fill="none" stroke="#26F4FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M2070 560 C2190 585 2235 675 2260 755" fill="none" stroke="#B6FF4D" stroke-width="8" stroke-linecap="round"/>
    <path d="M2580 1178 C2505 1100 2425 1085 2350 1060" fill="none" stroke="#FFD166" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g>
    <rect x="245" y="1960" width="1225" height="104" rx="52" fill="#102A44" stroke="#26F4FF" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">TOKENS + CACHE + GPU + POWER</text>
    <path d="M260 2145 H1075" stroke="url(#meter)" stroke-width="22" stroke-linecap="round"/>
    <text x="260" y="2290" class="small">2026-06-21</text>
    <text x="260" y="2580" class="small">AI INFRASTRUCTURE</text>
  </g>
</svg>
