<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1024"/>
      <stop offset="48%" stop-color="#4C286B"/>
      <stop offset="100%" stop-color="#172A45"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="26%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#C58BFF" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#38F2FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1A1024" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#38F2FF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#38F2FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C58BFF"/>
      <stop offset="55%" stop-color="#38F2FF"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#BFEFFF" opacity="0.12"/>
    </pattern>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 8px; fill: #E8FBFF; }
      .eyebrow { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 52px; font-weight: 900; letter-spacing: 7px; fill: #38F2FF; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 252px; font-weight: 950; letter-spacing: -1px; fill: #F6FCFF; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; fill: #BDEEFF; }
      .label { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 4px; fill: #E8FBFF; }
      .micro { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 3px; fill: #B8D9E8; }
    </style>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#dotGrid)" opacity="0.48"/>
  <circle cx="820" cy="980" r="1050" fill="url(#leftGlow)"/>
  <circle cx="2350" cy="1060" r="860" fill="url(#rightGlow)"/>
  <path d="M180 460 C650 350 980 520 1320 700 C1705 904 2030 760 2570 515" fill="none" stroke="#C58BFF" stroke-width="7" opacity="0.22"/>
  <path d="M260 2430 C780 2180 1240 2310 1700 2440 C2080 2548 2360 2505 2750 2310" fill="none" stroke="#38F2FF" stroke-width="7" opacity="0.18"/>

  <rect x="120" y="120" width="2760" height="2760" rx="110" fill="none" stroke="#AEEFFF" stroke-width="10" opacity="0.34"/>
  <rect x="165" y="165" width="2670" height="2670" rx="86" fill="none" stroke="#C58BFF" stroke-width="3" opacity="0.24"/>

  <text x="245" y="345" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <text x="245" y="540" class="eyebrow">DAILY TECH BRIEF</text>

  <g filter="url(#deepShadow)">
    <text x="245" y="990" class="title">JSON SCHEMA</text>
    <text x="245" y="1287" class="title">STRUCTURED</text>
    <text x="245" y="1584" class="title">OUTPUTS</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.96">
    <g>
      <rect x="1835" y="820" width="880" height="870" rx="84" fill="#081E34" stroke="#C58BFF" stroke-width="14"/>
      <text x="1940" y="1120" class="title" style="font-size:180px;fill:#38F2FF;letter-spacing:0px;">{ }</text>
      <path d="M2000 1260 H2550 M2000 1390 H2440 M2000 1520 H2605" fill="none" stroke="#F6FCFF" stroke-width="18" stroke-linecap="round" opacity="0.75"/>
      <rect x="1970" y="1775" width="700" height="300" rx="62" fill="#102A44" stroke="#38F2FF" stroke-width="12"/>
      <path d="M2070 1900 L2178 1995 L2395 1840" fill="none" stroke="#FFD166" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2475 1905 H2580 M2475 1995 H2540" fill="none" stroke="#C58BFF" stroke-width="14" stroke-linecap="round"/>
    </g>
  </g>

  <g>
    <rect x="245" y="1960" width="1273" height="104" rx="52" fill="#102A44" stroke="#C58BFF" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">CONSTRAINTS + VALIDATION + TRUST</text>
    <path d="M260 2145 H1075" stroke="url(#rule)" stroke-width="22" stroke-linecap="round"/>
    <text x="260" y="2290" class="small">2026-06-14</text>
    <text x="260" y="2580" class="small">AI OUTPUTS</text>
  </g>
</svg>
