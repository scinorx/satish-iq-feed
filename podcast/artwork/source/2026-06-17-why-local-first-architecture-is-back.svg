<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1710"/>
      <stop offset="48%" stop-color="#6D3B1C"/>
      <stop offset="100%" stop-color="#102C2A"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="26%" cy="34%" r="58%">
      <stop offset="0%" stop-color="#FFB347" stop-opacity="0.34"/>
      <stop offset="58%" stop-color="#5EF1D6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1E1710" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="40%" r="48%">
      <stop offset="0%" stop-color="#5EF1D6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#5EF1D6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="55%" stop-color="#5EF1D6"/>
      <stop offset="100%" stop-color="#FFF06A"/>
    </linearGradient>
    <filter id="deepShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="3" fill="#BFEFFF" opacity="0.12"/>
    </pattern>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 8px; fill: #E8FBFF; }
      .eyebrow { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 52px; font-weight: 900; letter-spacing: 7px; fill: #5EF1D6; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 208px; font-weight: 950; letter-spacing: -1px; fill: #F6FCFF; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 900; letter-spacing: 4px; fill: #BDEEFF; }
      .label { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 4px; fill: #E8FBFF; }
      .micro { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 3px; fill: #B8D9E8; }
    </style>
  </defs>

  <rect width="3000" height="3000" fill="url(#bg)"/>
  <rect width="3000" height="3000" fill="url(#dotGrid)" opacity="0.48"/>
  <circle cx="820" cy="980" r="1050" fill="url(#leftGlow)"/>
  <circle cx="2350" cy="1060" r="860" fill="url(#rightGlow)"/>
  <path d="M180 460 C650 350 980 520 1320 700 C1705 904 2030 760 2570 515" fill="none" stroke="#FFB347" stroke-width="7" opacity="0.22"/>
  <path d="M260 2430 C780 2180 1240 2310 1700 2440 C2080 2548 2360 2505 2750 2310" fill="none" stroke="#5EF1D6" stroke-width="7" opacity="0.18"/>

  <rect x="120" y="120" width="2760" height="2760" rx="110" fill="none" stroke="#AEEFFF" stroke-width="10" opacity="0.34"/>
  <rect x="165" y="165" width="2670" height="2670" rx="86" fill="none" stroke="#FFB347" stroke-width="3" opacity="0.24"/>

  <text x="245" y="345" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <text x="245" y="540" class="eyebrow">DAILY TECH BRIEF</text>

  <g filter="url(#deepShadow)">
    <text x="245" y="990" class="title">WHY LOCAL-FIRST</text>
    <text x="245" y="1235" class="title">ARCHITECTURE</text>
    <text x="245" y="1480" class="title">IS BACK</text>
  </g>

  <g filter="url(#softGlow)" opacity="0.96">
    <g>
      <rect x="1975" y="900" width="455" height="710" rx="86" fill="#081E34" stroke="#5EF1D6" stroke-width="14"/>
      <circle cx="2202" cy="1445" r="66" fill="none" stroke="#FFF06A" stroke-width="12"/>
      <path d="M2095 1035 H2290 M2095 1135 H2240 M2035 1770 H2740" fill="none" stroke="#FFB347" stroke-width="16" stroke-linecap="round"/>
      <rect x="2485" y="1060" width="320" height="230" rx="64" fill="#102A44" stroke="#FFB347" stroke-width="12"/>
      <path d="M2558 1195 C2600 1120 2690 1120 2735 1195" fill="none" stroke="#5EF1D6" stroke-width="16" stroke-linecap="round"/>
      <path d="M2415 1320 C2540 1435 2595 1565 2595 1770" fill="none" stroke="#FFF06A" stroke-width="13" stroke-linecap="round" stroke-dasharray="22 24"/>
      <circle cx="2595" cy="1770" r="52" fill="#5EF1D6" opacity="0.38"/>
    </g>
  </g>

  <g>
    <rect x="245" y="1960" width="1239" height="104" rx="52" fill="#102A44" stroke="#FFB347" stroke-width="5" opacity="0.92"/>
    <text x="310" y="2028" class="label">DEVICE STATE + SYNC + OWNERSHIP</text>
    <path d="M260 2145 H1075" stroke="url(#rule)" stroke-width="22" stroke-linecap="round"/>
    <text x="260" y="2290" class="small">2026-06-17</text>
    <text x="260" y="2580" class="small">LOCAL-FIRST</text>
  </g>
</svg>
