<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3000" height="3000" viewBox="0 0 3000 3000">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4FAFF"/>
      <stop offset="58%" stop-color="#B7DAF2"/>
      <stop offset="100%" stop-color="#6BA7CF"/>
    </linearGradient>
    <radialGradient id="topicGlow" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#0077C8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#073F32" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#6D4E00" flood-opacity="0.15"/>
    </filter>
    <style>
      .brand { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 68px; font-weight: 900; letter-spacing: 7px; fill: #003F6B; }
      .title { font-family: "Avenir Next Condensed", "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 205px; font-weight: 900; letter-spacing: 2px; fill: #003F6B; }
      .date { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 58px; font-weight: 900; letter-spacing: 7px; fill: #003F6B; }
      .small { font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 54px; font-weight: 900; letter-spacing: 3px; fill: #003F6B; }
    </style>
  </defs>
  <rect width="3000" height="3000" fill="url(#paper)"/>
  <circle cx="2450" cy="560" r="530" fill="#FFFFFF" opacity="0.22"/>
  <circle cx="360" cy="2500" r="560" fill="#FFFFFF" opacity="0.13"/>
  <circle cx="2250" cy="1540" r="770" fill="url(#topicGlow)" opacity="0.9"/>
  <g>
  <circle cx="2305" cy="1390" r="380" fill="none" stroke="#0077C8" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" opacity="0.36"/>
  <path d="M1970 1210 H2640 M1970 1390 H2640 M1970 1570 H2640 M2125 1010 V1770 M2485 1010 V1770" fill="none" stroke="#073F32" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.14"/>
  <path d="M1840 2050 H2765" fill="none" stroke="#0077C8" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" opacity="0.36"/>
</g>
  <rect x="135" y="135" width="2730" height="2730" rx="92" fill="none" stroke="#003F6B" stroke-width="12" opacity="0.36"/>
  <text x="245" y="360" class="brand">IN SIMPLE TERMS WITH SATISH</text>
  <g filter="url(#shadow)">
